<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>お団子キャッチ！ - 10秒間の和風ミニゲーム</title>
    <meta name="description" content="10秒間で降ってくる50個のお団子をいくつキャッチできるか挑戦！スマホブラウザで遊べる無料ミニゲームです。">
    <meta property="og:title" content="お団子キャッチ！ - 10秒間の和風ミニゲーム">
    <meta property="og:description" content="10秒間で降ってくる50個のお団子をいくつキャッチできるか挑戦！">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/dango-catch/">
    <meta property="og:image" content="https://example.com/dango-catch/ogp.png">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --bg-color: #F4F1EA;
            --text-color: #333333;
            --accent-color: #B7282E;
            --ui-bg: rgba(244, 241, 234, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(to bottom, #e8ecd6, #d4dcb9);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--ui-bg);
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-color);
            text-shadow: 2px 2px 0px #fff;
        }

        p.rules {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: bold;
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 30px;
            box-shadow: 0 4px 0 #7a181d;
            cursor: pointer;
            font-family: inherit;
            margin: 10px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #7a181d;
        }

        .share-btn {
            background-color: #1DA1F2;
            box-shadow: 0 4px 0 #0c85d0;
        }

        .share-btn:active {
            box-shadow: 0 0 0 #0c85d0;
        }

        #center-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="center-text"></div>

    <div id="home-screen" class="screen">
        <h1>お団子キャッチ</h1>
        <p class="rules">10秒間に降ってくる50個の<br>お団子🍡をお皿で受け止めろ！<br>（画面を左右にスワイプして操作）</p>
        <button id="start-btn">いざ、開始</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <h2 style="font-size: 2rem; margin-bottom: 10px;">結果発表</h2>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">
            <span style="font-size: 3.5rem; color: var(--accent-color); font-weight: bold;" id="final-score">0</span> / 50 個
        </p>
        <button id="retry-btn">もう一度挑む</button>
        <button id="share-btn" class="share-btn">Xで結果をシェア</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const homeScreen = document.getElementById('home-screen');
    const resultScreen = document.getElementById('result-screen');
    const centerText = document.getElementById('center-text');
    const scoreDisplay = document.getElementById('final-score');

    let logicalWidth, logicalHeight;
    let dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        logicalWidth = container.clientWidth;
        logicalHeight = container.clientHeight;
        
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        
        if (catcher.y === 0) catcher.y = logicalHeight - 80;
    }
    window.addEventListener('resize', resizeCanvas);

    let gameState = 'home';
    let score = 0;
    let dangos = [];
    let effects = [];
    let spawnedCount = 0;
    let gameTimer = 0;
    let lastTimestamp = 0;
    let animationId = null;
    let spawnIntervalId = null;
    let countdownIntervalId = null;
    
    const MAX_DANGOS = 50;
    const GAME_DURATION = 10000;
    const DANGO_EMOJI = '🍡';

    const catcher = {
        width: 110,
        height: 20,
        x: 0,
        y: 0, 
        baseY: 0,
        yOffset: 0,
        color: '#4A3B32'
    };

    resizeCanvas();
    catcher.x = logicalWidth / 2 - catcher.width / 2;
    catcher.baseY = logicalHeight - 80;
    catcher.y = catcher.baseY;

    let lastTouchX = null;

    canvas.addEventListener('touchstart', (e) => {
        if (gameState !== 'playing' && gameState !== 'finishing') return;
        lastTouchX = e.touches[0].clientX;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (gameState !== 'playing' && gameState !== 'finishing') return;
        e.preventDefault();
        
        const currentTouchX = e.touches[0].clientX;
        if (lastTouchX !== null) {
            catcher.x += (currentTouchX - lastTouchX);
            if (catcher.x < 0) catcher.x = 0;
            if (catcher.x + catcher.width > logicalWidth) catcher.x = logicalWidth - catcher.width;
        }
        lastTouchX = currentTouchX;
    }, { passive: false });

    canvas.addEventListener('touchend', () => { lastTouchX = null; });

    function spawnDango() {
        if (spawnedCount >= MAX_DANGOS || gameState !== 'playing') return;
        dangos.push({
            x: Math.random() * (logicalWidth - 40) + 20,
            y: -30,
            speedY: Math.random() * 2 + 5,
            size: 35,
            active: true
        });
        spawnedCount++;
    }

    function update(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const dt = timestamp - lastTimestamp;
        lastTimestamp = timestamp;
        const timeScale = dt / 16.66;

        ctx.clearRect(0, 0, logicalWidth, logicalHeight);

        if (gameState === 'playing') {
            gameTimer += dt;
        }

        const timeRate = Math.min(gameTimer / GAME_DURATION, 1);
        ctx.fillStyle = gameTimer > GAME_DURATION - 3000 ? 'rgba(183, 40, 46, 0.6)' : 'rgba(92, 126, 68, 0.5)';
        ctx.fillRect(0, 0, logicalWidth * (1 - timeRate), 6);

        if (catcher.yOffset > 0) catcher.yOffset -= 1 * timeScale;
        if (catcher.yOffset < 0) catcher.yOffset = 0;
        catcher.y = catcher.baseY + catcher.yOffset;

        ctx.fillStyle = catcher.color;
        ctx.beginPath();
        ctx.roundRect(catcher.x, catcher.y, catcher.width, catcher.height, 10);
        ctx.fill();

        ctx.fillStyle = '#333';
        ctx.font = 'bold 22px "Yu Mincho", serif';
        ctx.textAlign = 'left';
        ctx.fillText(`得点: ${score}`, 20, 35);

        ctx.font = '35px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        let activeDangos = 0;

        for (let i = 0; i < dangos.length; i++) {
            let d = dangos[i];
            if (!d.active) continue;
            activeDangos++;

            d.y += d.speedY * timeScale;
            ctx.fillText(DANGO_EMOJI, d.x, d.y);

            const hitboxMargin = 15;
            if (d.y + d.size/2 >= catcher.y && d.y - d.size/2 <= catcher.y + catcher.height) {
                if (d.x >= catcher.x - hitboxMargin && d.x <= catcher.x + catcher.width + hitboxMargin) {
                    score++;
                    d.active = false;
                    catcher.yOffset = 8;
                    
                    effects.push({ x: d.x, y: catcher.y - 20, life: 1.0 });
                }
            }
            if (d.y > logicalHeight + 50) d.active = false;
        }

        ctx.font = 'bold 24px Arial';
        for (let i = effects.length - 1; i >= 0; i--) {
            let e = effects[i];
            e.y -= 2 * timeScale;
            e.life -= 0.04 * timeScale;
            ctx.fillStyle = `rgba(183, 40, 46, ${Math.max(e.life, 0)})`;
            ctx.fillText('+1', e.x, e.y);
            if (e.life <= 0) effects.splice(i, 1);
        }

        if (gameState === 'playing' && gameTimer >= GAME_DURATION) {
            gameState = 'finishing';
            clearInterval(spawnIntervalId);
            centerText.innerText = "終了！";
            centerText.style.opacity = 1;
        } else if (gameState === 'finishing' && activeDangos === 0) {
            endGame();
            return; 
        }

        animationId = requestAnimationFrame(update);
    }

    function startGameSequence() {
        if (animationId) cancelAnimationFrame(animationId);
        if (spawnIntervalId) clearInterval(spawnIntervalId);
        if (countdownIntervalId) clearInterval(countdownIntervalId);

        homeScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        
        score = 0;
        dangos = [];
        effects = [];
        spawnedCount = 0;
        gameTimer = 0;
        lastTimestamp = 0;
        catcher.x = logicalWidth / 2 - catcher.width / 2;
        ctx.clearRect(0, 0, logicalWidth, logicalHeight);

        centerText.style.opacity = 1;
        let count = 3;
        centerText.innerText = count;
        
        countdownIntervalId = setInterval(() => {
            count--;
            if (count > 0) {
                centerText.innerText = count;
            } else if (count === 0) {
                centerText.innerText = "開始！";
            } else {
                clearInterval(countdownIntervalId);
                centerText.style.opacity = 0;
                startPlay();
            }
        }, 1000);
    }

    function startPlay() {
        gameState = 'playing';
        lastTimestamp = performance.now();
        spawnIntervalId = setInterval(spawnDango, 200);
        animationId = requestAnimationFrame(update);
    }

    function endGame() {
        gameState = 'result';
        if (animationId) cancelAnimationFrame(animationId);
        centerText.style.opacity = 0;
        scoreDisplay.innerText = score;
        resultScreen.classList.remove('hidden');
    }

    document.getElementById('start-btn').addEventListener('click', startGameSequence);
    document.getElementById('retry-btn').addEventListener('click', startGameSequence);
    document.getElementById('share-btn').addEventListener('click', () => {
        const text = encodeURIComponent(`10秒間で${score}個のお団子をキャッチしたよ！🍡\nあなたも挑戦してみてね！\n#お団子キャッチ #ミニゲーム`);
        const url = encodeURIComponent('https://example.com/dango-catch/'); 
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    });

</script>
</body>
</html>
