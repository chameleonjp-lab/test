<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>お団子キャッチ！ - 10秒間の和風ミニゲーム</title>
    <meta name="description" content="10秒間で降ってくるお団子をキャッチ！ケーキは減点！スマホブラウザで遊べる無料ミニゲームです。">

    <style>
        :root {
            --bg-color: #F4F1EA;
            --text-color: #333333;
            --accent-color: #B7282E;
            --ui-bg: rgba(244, 241, 234, 0.95);
        }

        /* スマホブラウザ特有のスクロールやバウンスを完全に防止 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background-color: #d4dcb9;
            touch-action: none;
            font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
            color: var(--text-color);
        }

        #game-container {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            max-width: 600px;
            background: linear-gradient(to bottom, #e8ecd6, #d4dcb9);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--ui-bg);
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-color);
            text-shadow: 2px 2px 0px #fff;
        }

        p.rules {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: bold;
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 30px;
            box-shadow: 0 4px 0 #7a181d;
            cursor: pointer;
            font-family: inherit;
            margin: 10px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #7a181d;
        }

        .share-btn {
            background-color: #1DA1F2;
            box-shadow: 0 4px 0 #0c85d0;
        }

        .share-btn:active {
            box-shadow: 0 0 0 #0c85d0;
        }

        #center-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="center-text"></div>

    <div id="home-screen" class="screen">
        <h1>お団子キャッチ</h1>
        <p class="rules">10秒間で「お団子🍡(+1)」をキャッチ！<br>「ケーキ🍰(-3)」は避けてね！<br>（画面を左右にスワイプして操作）</p>
        <button id="start-btn">いざ、開始</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <h2 style="font-size: 2rem; margin-bottom: 10px;">結果発表</h2>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">
            得点: <span style="font-size: 3.5rem; color: var(--accent-color); font-weight: bold;" id="final-score">0</span>
        </p>
        <button id="retry-btn">もう一度挑む</button>
        <button id="share-btn" class="share-btn">Xで結果をシェア</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const homeScreen = document.getElementById('home-screen');
    const resultScreen = document.getElementById('result-screen');
    const centerText = document.getElementById('center-text');
    const scoreDisplay = document.getElementById('final-score');
    const container = document.getElementById('game-container');

    let logicalWidth, logicalHeight;
    let dpr = window.devicePixelRatio || 1;

    // iPhone SE等のブラウザバー対応：実際の画面高さを取得
    function resizeCanvas() {
        // innerHeightをコンテナに強制適用
        container.style.height = window.innerHeight + 'px';
        
        logicalWidth = container.clientWidth;
        logicalHeight = window.innerHeight;
        
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        ctx.scale(dpr, dpr);
        
        // お皿の位置を画面下部から余裕を持たせた位置に設定（見切れ防止）
        catcher.baseY = logicalHeight - 100;
        catcher.y = catcher.baseY;
    }
    window.addEventListener('resize', resizeCanvas);

    let gameState = 'home'; // home, playing, waiting_for_fall, finished, result
    let score = 0;
    let items = [];
    let effects = [];
    let spawnQueue = [];
    let gameTimer = 0;
    let lastTimestamp = 0;
    let animationId = null;
    let spawnIntervalId = null;
    let countdownIntervalId = null;
    
    const GAME_DURATION = 10000;
    const DANGO_EMOJI = '🍡';
    const CAKE_EMOJI = '🍰';

    const catcher = {
        width: 110,
        height: 20,
        x: 0,
        y: 0, 
        baseY: 0,
        yOffset: 0,
        color: '#4A3B32'
    };

    resizeCanvas();
    catcher.x = logicalWidth / 2 - catcher.width / 2;

    let lastTouchX = null;

    canvas.addEventListener('touchstart', (e) => {
        if (gameState !== 'playing' && gameState !== 'waiting_for_fall') return;
        lastTouchX = e.touches[0].clientX;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (gameState !== 'playing' && gameState !== 'waiting_for_fall') return;
        e.preventDefault(); // スクロール防止
        
        const currentTouchX = e.touches[0].clientX;
        if (lastTouchX !== null) {
            catcher.x += (currentTouchX - lastTouchX);
            if (catcher.x < 0) catcher.x = 0;
            if (catcher.x + catcher.width > logicalWidth) catcher.x = logicalWidth - catcher.width;
        }
        lastTouchX = currentTouchX;
    }, { passive: false });

    canvas.addEventListener('touchend', () => { lastTouchX = null; });

    // 50個の団子と10個のケーキの生成リストを作成
    function initSpawnQueue() {
        spawnQueue = [];
        for (let i = 0; i < 50; i++) spawnQueue.push('dango');
        for (let i = 0; i < 10; i++) spawnQueue.push('cake');
        
        // ランダムにシャッフル
        for (let i = spawnQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
        }
    }

    function spawnItem() {
        if (spawnQueue.length === 0 || gameState !== 'playing') return;
        
        const type = spawnQueue.pop(); // キューから取り出す
        
        items.push({
            type: type,
            x: Math.random() * (logicalWidth - 40) + 20,
            y: -40,
            speedY: Math.random() * 2 + 5,
            size: 35,
            active: true
        });
    }

    function update(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const dt = timestamp - lastTimestamp;
        lastTimestamp = timestamp;
        const timeScale = dt / 16.66;

        ctx.clearRect(0, 0, logicalWidth, logicalHeight);

        if (gameState === 'playing') {
            gameTimer += dt;
        }

        // 上部のタイムゲージ
        const timeRate = Math.min(gameTimer / GAME_DURATION, 1);
        ctx.fillStyle = gameTimer > GAME_DURATION - 3000 ? 'rgba(183, 40, 46, 0.6)' : 'rgba(92, 126, 68, 0.5)';
        ctx.fillRect(0, 0, logicalWidth * (1 - timeRate), 6);

        // お皿のバウンド
        if (catcher.yOffset > 0) catcher.yOffset -= 1 * timeScale;
        if (catcher.yOffset < 0) catcher.yOffset = 0;
        catcher.y = catcher.baseY + catcher.yOffset;

        ctx.fillStyle = catcher.color;
        ctx.beginPath();
        ctx.roundRect(catcher.x, catcher.y, catcher.width, catcher.height, 10);
        ctx.fill();

        ctx.fillStyle = '#333';
        ctx.font = 'bold 24px "Yu Mincho", serif';
        ctx.textAlign = 'left';
        ctx.fillText(`得点: ${score}`, 20, 35);

        ctx.font = '35px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        let activeItemsCount = 0;

        for (let i = 0; i < items.length; i++) {
            let d = items[i];
            if (!d.active) continue;
            activeItemsCount++;

            d.y += d.speedY * timeScale;
            
            const emoji = d.type === 'dango' ? DANGO_EMOJI : CAKE_EMOJI;
            ctx.fillText(emoji, d.x, d.y);

            const hitboxMargin = 15;
            if (d.y + d.size/2 >= catcher.y && d.y - d.size/2 <= catcher.y + catcher.height) {
                if (d.x >= catcher.x - hitboxMargin && d.x <= catcher.x + catcher.width + hitboxMargin) {
                    
                    d.active = false;
                    catcher.yOffset = 8;
                    
                    if (d.type === 'dango') {
                        score++;
                        effects.push({ x: d.x, y: catcher.y - 20, life: 1.0, text: '+1', color: '#B7282E' }); // 赤
                    } else if (d.type === 'cake') {
                        score -= 3;
                        effects.push({ x: d.x, y: catcher.y - 20, life: 1.0, text: '-3', color: '#1E3A8A' }); // 青
                    }
                }
            }
            if (d.y > logicalHeight + 50) d.active = false;
        }

        // 点数エフェクトの描画
        ctx.font = 'bold 24px Arial';
        for (let i = effects.length - 1; i >= 0; i--) {
            let e = effects[i];
            e.y -= 2 * timeScale;
            e.life -= 0.04 * timeScale;
            
            // 色をrgbaに変換して透明度を適用
            const hex = e.color.replace('#', '');
            const r = parseInt(hex.substring(0,2), 16);
            const g = parseInt(hex.substring(2,4), 16);
            const b = parseInt(hex.substring(4,6), 16);
            
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${Math.max(e.life, 0)})`;
            ctx.fillText(e.text, e.x, e.y);
            
            if (e.life <= 0) effects.splice(i, 1);
        }

        // ゲーム状態の遷移
        if (gameState === 'playing' && gameTimer >= GAME_DURATION) {
            // 10秒経過：生成を止めて、落ち切るのを待つフェーズへ
            gameState = 'waiting_for_fall';
            clearInterval(spawnIntervalId);
        } else if (gameState === 'waiting_for_fall' && activeItemsCount === 0) {
            // 画面上からすべてのアイテムが消えたら、本当に終了
            gameState = 'finished';
            centerText.innerText = "終了！";
            centerText.style.opacity = 1;
            
            // 1.5秒後にリザルト画面へ
            setTimeout(endGame, 1500);
        }

        if (gameState !== 'result') {
            animationId = requestAnimationFrame(update);
        }
    }

    function startGameSequence() {
        if (animationId) cancelAnimationFrame(animationId);
        if (spawnIntervalId) clearInterval(spawnIntervalId);
        if (countdownIntervalId) clearInterval(countdownIntervalId);

        homeScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        
        score = 0;
        items = [];
        effects = [];
        gameTimer = 0;
        lastTimestamp = 0;
        
        resizeCanvas();
        catcher.x = logicalWidth / 2 - catcher.width / 2;
        ctx.clearRect(0, 0, logicalWidth, logicalHeight);

        initSpawnQueue();

        centerText.style.opacity = 1;
        let count = 3;
        centerText.innerText = count;
        
        countdownIntervalId = setInterval(() => {
            count--;
            if (count > 0) {
                centerText.innerText = count;
            } else if (count === 0) {
                centerText.innerText = "開始！";
            } else {
                clearInterval(countdownIntervalId);
                centerText.style.opacity = 0;
                startPlay();
            }
        }, 1000);
    }

    function startPlay() {
        gameState = 'playing';
        lastTimestamp = performance.now();
        // 60個のアイテムを約8.5秒で生成しきるペース (140ms間隔)
        spawnIntervalId = setInterval(spawnItem, 140);
        animationId = requestAnimationFrame(update);
    }

    function endGame() {
        gameState = 'result';
        centerText.style.opacity = 0;
        scoreDisplay.innerText = score;
        resultScreen.classList.remove('hidden');
    }

    document.getElementById('start-btn').addEventListener('click', startGameSequence);
    document.getElementById('retry-btn').addEventListener('click', startGameSequence);
    document.getElementById('share-btn').addEventListener('click', () => {
        const text = encodeURIComponent(`お団子キャッチで【${score}点】を獲得したよ！🍡\n（ケーキ🍰を取ると減点されるよ！）\nあなたも挑戦してみてね！\n#お団子キャッチ #ミニゲーム`);
        const url = encodeURIComponent('https://chameleonjp-lab.github.io/test/'); 
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    });

</script>
</body>
</html>
